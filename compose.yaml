services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: notes
      PGDATA: /var/lib/postgresql/18/data
    volumes:
      - postgres_data:/var/lib/postgresql/18/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d notes"]
      interval: 10s
      timeout: 5s
      retries: 5 
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      - /etc/notes/backend.env
    depends_on:
      db:
        condition: service_healthy
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./notes-docker.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  postgres_data:
